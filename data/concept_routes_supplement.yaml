category_concept_frames:
- category: agentic_cyber_misuse
  frame: 'Treat the topic as a misuse-case control problem: identify the agent permission, prompt path, tool boundary, and
    blocked outcome.'
- category: historical_humint_source_protection
  frame: Study the declassified record for institutional lessons about source protection, oversight, and the danger of translating
    historical methods into current practice.
- category: ics_evasion_coverage
  frame: 'Use the tactic family as a defensive coverage question: which monitoring, logging, and operator-review controls
    would reveal evasion in a tabletop scenario?'
- category: ics_collection_detection
  frame: Use the tactic family as a detection-design question over synthetic process tags, not as guidance for observing or
    changing a real process.
- category: software_supply_chain_social_trust
  frame: Analyze how trust, maintainer contact, and package provenance become supply-chain assurance evidence without contacting
    or profiling real maintainers.
- category: osint_tool_governance
  frame: Evaluate the tool class by provenance, legality, rate limits, identity exposure, and reproducibility before any public-source
    claim is reused.
- category: humint_recruitment_risk
  frame: 'Read the concept as recruitment-risk literacy: identify pressure, consent, source-protection duties, and the line
    that blocks contact activity.'
- category: humint_handling_history
  frame: Use the historical motif to discuss source-protection ethics, documentation, and oversight without recreating handling
    procedures.
- category: sigint_authority
  frame: Connect the technical term to authority, minimization, communications-security risk, and public doctrine rather than
    interception mechanics.
- category: cyber_taxonomy
  frame: Use the taxonomy label to organize fabricated defensive observations, confidence, and control implications without
    describing adversary execution.
- category: ics_safety
  frame: Translate the technique family into safety, availability, operator decision, and recovery-evidence questions for
    a tabletop.
- category: cognitive_resilience
  frame: 'Focus on transparent resilience education: provenance, audience harm, attribution caution, and non-manipulative
    response options.'
- category: gray_zone_governance
  frame: Identify ambiguous-threshold activity through indicators, attribution caution, and policy review—not through prescribed
    response actions.
- category: non_state_actor_governance
  frame: Study organizational and funding indicators with open-source evidence, minimization, and explicit uncertainty.
- category: financial_due_diligence
  frame: Structure financial-pattern review as typology-driven due diligence with escalation thresholds, not proof of wrongdoing.
- category: counterintelligence_vetting
  frame: Connect vetting and insider-threat review to access control, anomaly signals, and accountable escalation.
- category: operator_decision_hygiene
  frame: Manage workload and bias through prioritization, explicit handoffs, and review checkpoints—not unsustainable pace.
- category: geoint_data_quality
  frame: Audit imagery and map products for resolution, accuracy, temporal fitness, and uncertainty before any geospatial
    claim.
- category: geoint_uncertainty
  frame: Treat geolocation and attribution claims as uncertainty problems with synthetic records and explicit caveats.
- category: agentic_tool_isolation
  frame: Review sandbox policy, tool isolation, and deny-by-default rules using toy fixtures only.
- category: ageint_pattern_registry
  frame: 'Use the pattern name as safe architectural vocabulary: allowlisted tools, logging, human approval, and blocked external
    action.'
- category: analytic_tradecraft
  frame: Apply structured analytic methods with explicit alternatives, evidence tables, and calibrated confidence—not rhetorical
    certainty.
- category: analytic_tradecraft_sats
  frame: Use structured analytic techniques to keep alternatives, disconfirming evidence, and confidence visible before convergence.
- category: analytic_tradecraft_standards
  frame: Apply ICD 203 tradecraft standards to sourcing, uncertainty, alternatives, and argumentation—not rhetorical certainty.
- category: analytic_tradecraft_bias
  frame: Connect cognitive bias literacy to review checkpoints, dissent channels, and explicit uncertainty language.
- category: operational_tradecraft_governance
  frame: 'Treat operational tradecraft as governance: OPSEC, compartmentation, cover discipline, and oversight—not contact
    or evasion activity.'
- category: cognitive_resilience_epistemic
  frame: Protect knowledge production with provenance, dissent channels, and transparent correction—not narrative control.
- category: cognitive_resilience_inoculation
  frame: Build audience resilience with transparent labels, source checks, and non-manipulative corrections.
- category: cognitive_resilience_neuro
  frame: Connect neurocognitive claims to analytic bias literacy and review compensation—not operational timing advice.
- category: critical_infrastructure_sharing
  frame: Evaluate ISAC and sector sharing by handling rules, anonymization, confidence, and consumer responsibilities.
