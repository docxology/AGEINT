profiles:
- identifier: governed_intelligence_cycle
  disciplinary_frame: 'intelligence as a governed information cycle: requirements
    become collection, collection becomes evaluated evidence, evidence becomes analytic
    judgment, and judgment becomes a disseminated product with markings, records,
    feedback, and oversight'
  key_distinction: separate intelligence work from ordinary research by naming authority,
    audience, caveats, and feedback
  vocabulary:
  - term: Requirement
    definition: the decision need or learning question that justifies evidence collection
  - term: Dissemination
    definition: the controlled movement of an intelligence product to an authorized
      audience
  - term: Marking
    definition: the vocabulary that communicates handling, caveat, and release limits
  - term: Feedback loop
    definition: the customer or reviewer signal that tests whether the product answered
      the need
  - term: Records duty
    definition: the retention, deletion, or refresh obligation attached to an artifact
  - term: Decision hygiene
    definition: habits that keep requirements, evidence, and reviewer judgment aligned
      under load
  - term: Information architecture
    definition: how sources, notes, and products are organized so uncertainty stays
      visible
  worked_scenario: a synthetic analyst team rebuilds a storm-impact brief after discovering
    a stale requirement and overloaded reading queue
  worked_input: public weather bulletins, public infrastructure maps, historical outage
    summaries, and instructor-provided toy records
  worked_process: map the requirement, tag each source, separate observation from
    judgment, assign caveats, and record the dissemination audience
  worked_output: a one-page release-neutral brief with source descriptors, confidence
    language, caveats, and a feedback owner
  practice_focus: cycle mapping and audience-aware product design
  review_question: Which requirement, source, or workflow step failed first when the
    team ran out of review time?
- identifier: operator_productivity
  disciplinary_frame: 'intelligence productivity as governed cognitive performance:
    external memory, workload limits, flow conditions, and explicit review handoffs
    keep judgment reliable under sustained tempo'
  key_distinction: separate cognitive hygiene from heroics, and workload signals from
    unreviewed urgency
  vocabulary:
  - term: External memory
    definition: a trusted capture system that holds tasks and commitments outside
      working memory
  - term: NASA-TLX
    definition: a subjective workload instrument for rating mental, temporal, and
      effort demands
  - term: Flow precondition
    definition: task clarity, challenge-skill balance, and feedback that enable focused
      work
  - term: Decision hygiene
    definition: habits that preserve evidence review, handoffs, and rest boundaries
      under load
  - term: Task switching
    definition: context change with measurable recovery cost and explicit re-entry
      notes
  worked_scenario: a synthetic analyst cell rebuilds a weekly reading queue after
    workload scores spike during a surge brief
  worked_input: synthetic task lists, NASA-TLX self-ratings, instructor-provided focus
    blocks, and a handoff template
  worked_process: capture open loops, score workload, schedule focus blocks, document
    handoffs, and assign reviewer checkpoints
  worked_output: an operator workload card with queue state, TLX scores, focus plan,
    handoff owner, and rest boundary
  practice_focus: workload-aware operator decision hygiene
  review_question: Which workload signal or handoff gap would have prevented the quality
    drop?
- identifier: analytic_tradecraft
  disciplinary_frame: 'analytic tradecraft as disciplined judgment under uncertainty:
    claims become useful only when evidence, assumptions, alternatives, confidence,
    and dissent remain visible'
  key_distinction: separate reporting from inference, and inference from judgment
  vocabulary:
  - term: Source descriptor
    definition: a compact statement of where evidence came from and what it can support
  - term: Assumption
    definition: a claim accepted for analysis that still needs challenge
  - term: Alternative hypothesis
    definition: a plausible explanation that competes with the favored account
  - term: Confidence
    definition: a calibrated expression of evidentiary strength and analytic uncertainty
  - term: Dissent
    definition: a documented disagreement that preserves minority reasoning for review
  worked_scenario: a synthetic analyst cell evaluates whether a benign supplier delay
    signals normal friction or elevated risk
  worked_input: synthetic shipment notes, public policy excerpts, and a short instructor-provided
    event timeline
  worked_process: write hypotheses, list evidence for and against each, mark assumptions,
    and assign confidence only after alternatives are tested
  worked_output: an analytic note with a hypothesis table, confidence statement, dissent
    field, and collection gap list
  practice_focus: structured reasoning and source-integrity review
  review_question: Which assumption would change the judgment if it were false?
- identifier: ai_ethics_data_governance
  disciplinary_frame: 'AI governance as lifecycle control: data, model, prompt, output,
    human reviewer, rights impact, and retention rule remain traceable'
  key_distinction: separate technical capability from lawful, accountable, and rights-respecting
    use
  vocabulary:
  - term: Purpose limitation
    definition: the bounded reason a data or model use is allowed
  - term: Model card
    definition: a structured record of intended use, limits, evaluation, and ownership
  - term: Dataset card
    definition: a structured record of origin, composition, transformations, and limits
  - term: Bias review
    definition: a socio-technical check for unequal error, access, or impact
  - term: Human accountability
    definition: the named person or role responsible for accepting or rejecting output
  - term: Impact assessment
    definition: a scored review that links system purpose, safeguards, and affected
      people
  - term: Public register
    definition: an accessible inventory entry that explains approved AI use and review
      status
  worked_scenario: a synthetic training office evaluates whether a summarization agent
    can support course readings
  worked_input: public source excerpts, synthetic learner questions, a model-use note,
    and an accessibility checklist
  worked_process: define purpose, inspect data provenance, document limits, test sample
    summaries, and assign a human review owner
  worked_output: an AI/data impact card with intended use, excluded use, evaluation
    evidence, and refresh trigger
  practice_focus: model/data documentation and rights-aware review
  review_question: What part of the workflow needs human judgment even if the model
    output looks fluent?
- identifier: agentic_ai_governance
  disciplinary_frame: 'agentic AI as delegated action under control: identity, authority,
    tool permissions, memory, logs, stop conditions, and recoverability define what
    an agent may do'
  key_distinction: separate agent assistance from autonomous external action
  vocabulary:
  - term: Agent identity
    definition: the named software actor, role, and authorization context for a run
  - term: Tool allowlist
    definition: the bounded set of actions the agent may request
  - term: Delegation
    definition: the handoff of a task under explicit human authority and review
  - term: Bounded autonomy
    definition: the documented ceiling on what an agent may decide or request without
      review
  - term: Recoverability
    definition: the path back to a known-safe state after a bad output or action request
  - term: AI incident
    definition: a logged event where an AI system creates or plausibly creates harm
      or loss of control
  - term: Prompt injection
    definition: untrusted content that attempts to override instructions or authority
      boundaries
  - term: Pattern registry
    definition: the catalog of approved agent behaviors, prompts, and evaluation hooks
  - term: Adversarial eval
    definition: structured tests that probe agent misuse, injection, and over-delegation
      before release
  worked_scenario: a synthetic research assistant agent organizes public readings
    for an instructor
  worked_input: public URLs, a fixed retrieval tool, a summarization prompt, a time
    budget, and a stop condition
  worked_process: bind the agent identity, list allowed tools, set autonomy limits,
    capture sources, block unsafe requests, and log approvals
  worked_output: an agent run card with tool calls, source links, blocked actions,
    reviewer notes, incident threshold, and recovery decision
  practice_focus: least-privilege agent design and run review
  review_question: Which permission can be removed while preserving the learning objective?
- identifier: osint_geoint
  disciplinary_frame: 'OSINT and GEOINT as public-source reasoning disciplines: availability
    does not equal reliability, relevance, legality, or ethical reuse'
  key_distinction: separate discovery from collection expansion, and map or media
    interpretation from targeting
  vocabulary:
  - term: Provenance
    definition: the origin, chain, and transformation history of a source
  - term: Corroboration
    definition: the comparison of independent sources before reuse
  - term: Recency
    definition: the time relationship between source creation, discovery, and claim
  - term: Geospatial quality
    definition: accuracy, completeness, temporal fitness, and usability of location
      data
  - term: Minimization
    definition: limiting retained information to what the accountable question requires
  worked_scenario: a synthetic public-resilience team checks whether open data supports
    a non-sensitive evacuation-route map
  worked_input: public road data, public weather notices, synthetic change examples,
    and instructor-provided metadata
  worked_process: record provenance, test recency, compare independent sources, mark
    uncertainty, and remove unnecessary identity data
  worked_output: a source-quality matrix and annotated map note with caveats and no
    tracking or targeting content
  practice_focus: source-quality review and non-sensitive geospatial interpretation
  review_question: Which source is available but not reliable enough for the claim?
- identifier: collection_management
  disciplinary_frame: 'collection management as requirements discipline: a source
    method is considered only after the priority, authority, minimization rule, source
    risk, and evaluation plan are explicit'
  key_distinction: separate collection discipline concepts from operational recruitment,
    interception, or tasking procedures
  vocabulary:
  - term: Priority
    definition: the relative importance of an intelligence question
  - term: Source discipline
    definition: a broad evidence channel such as HUMINT, SIGINT, GEOINT, OSINT, or
      FININT
  - term: Minimization
    definition: the rule that limits acquisition, retention, or use of unnecessary
      information
  - term: Source protection
    definition: the duty to reduce risk to people, methods, and sensitive relationships
  - term: Evaluation
    definition: the feedback step that tests whether the evidence satisfied the requirement
  - term: Gray-zone indicator
    definition: an observable signal of ambiguous coercion below armed conflict thresholds
  - term: Proxy pattern
    definition: a relationship suggesting indirect sponsorship without confirmed operational
      control
  worked_scenario: a synthetic policy cell compares public indicators of hybrid pressure
    against an approved collection plan for a benign border-disruption exercise
  worked_input: public notices, synthetic interview summaries, public logistics records,
    and an instructor scope card
  worked_process: rank requirements, choose the least intrusive source discipline,
    list excluded actions, and evaluate evidence quality
  worked_output: a requirements-to-evidence matrix with discipline fit, source caveats,
    minimization notes, and gaps
  practice_focus: requirements decomposition and source-discipline fit
  review_question: Which gray-zone indicator changes the least-intrusive source choice
    without crossing into operational tasking?
- identifier: financial_economic_security
  disciplinary_frame: 'FININT and economic-security analysis as lawful due diligence:
    signals are interpreted through official lists, typology context, beneficial-ownership
    uncertainty, and compliance boundaries'
  key_distinction: separate compliance-oriented risk analysis from evasion, attribution
    certainty, or targeting
  vocabulary:
  - term: Typology
    definition: a recurring pattern used to recognize financial-crime or sanctions-risk
      signals
  - term: Sanctions program
    definition: the legal and policy structure behind a restricted-party or country
      measure
  - term: Beneficial ownership
    definition: the natural-person control or ownership question behind an entity
  - term: Red flag
    definition: an indicator that triggers review rather than a standalone conclusion
  - term: Compliance boundary
    definition: the line between lawful screening or resilience analysis and prohibited
      evasion advice
  worked_scenario: a sample nonprofit screens a synthetic supplier record for classroom
    due-diligence practice
  worked_input: toy entity records, public sanctions-program descriptions, synthetic
    transaction summaries, and supplier-context notes
  worked_process: check official list provenance, identify red flags, preserve beneficial-ownership
    uncertainty, and avoid evasion guidance
  worked_output: an economic-security packet with source links, uncertainty, red-flag
    rationale, and a compliance review owner
  practice_focus: defensive due diligence and uncertainty-preserving FININT
  review_question: Which red flag requires escalation, and what evidence is still
    missing?
- identifier: counterintelligence_source_integrity
  disciplinary_frame: 'counterintelligence as source-integrity defense: the class
    studies how institutions protect evidence, people, access, and judgment from deception
    and compromise'
  key_distinction: separate defensive awareness from surveillance, handling, or operational
    security playbooks
  vocabulary:
  - term: Source integrity
    definition: confidence that evidence has not been distorted, laundered, or compromised
  - term: Compromise signal
    definition: a clue that access, identity, or source reliability needs review
  - term: Corroboration
    definition: independent support that reduces single-source vulnerability
  - term: Insider risk
    definition: risk created by trusted access combined with motive, pressure, or
      control failure
  - term: Protected disclosure
    definition: a safe channel for reporting concerns without exposing sensitive details
  worked_scenario: a sample research lab reviews a synthetic source-quality anomaly
    after a disputed report
  worked_input: toy access logs, public policy excerpts, synthetic source notes, and
    a reviewer escalation path
  worked_process: separate identity from access, list anomaly hypotheses, seek corroboration,
    and route sensitive concerns to review
  worked_output: a source-integrity memo with competing explanations, confidence,
    protected-disclosure note, and next-review owner
  practice_focus: deception-aware source review and defensive escalation
  review_question: Which explanation preserves uncertainty without ignoring a possible
    compromise signal?
- identifier: cognitive_influence_security
  disciplinary_frame: cognitive security as protection of attention, trust, memory,
    and decision quality without creating manipulation
  key_distinction: separate analysis of influence from persuasion design
  vocabulary:
  - term: Narrative provenance
    definition: where a claim, frame, or story came from and how it spread
  - term: Prebunking
    definition: transparent education that helps people recognize misleading patterns
      before exposure
  - term: Audience harm
    definition: a privacy, dignity, autonomy, or trust risk for people receiving information
  - term: Attribution caution
    definition: the rule that intent and origin claims need strong evidence
  - term: Resilience response
    definition: a transparent education, correction, or process improvement that avoids
      manipulation
  - term: MISO boundary
    definition: the line between accountable public messaging analysis and covert influence
      design
  - term: Inoculation
    definition: building recognition of manipulation tactics without deploying persuasion
      against a population
  worked_scenario: a sample public-library class evaluates a synthetic rumor about
    a community service and compares transparent correction options
  worked_input: sample posts, source timestamps, public-service facts, and a media-literacy
    rubric
  worked_process: trace narrative provenance, separate observation from attribution,
    name audience harms, and design a transparent lesson
  worked_output: a narrative-risk map with caveats, response options, and no microtargeted
    persuasion
  practice_focus: information-integrity analysis and resilience education
  review_question: Which response informs people without crossing into MISO-style
    manipulation or unverified attribution?
- identifier: historical_declassified_sources
  disciplinary_frame: 'historical intelligence study as declassified evidence review:
    archives teach institutional lessons when provenance, redaction, context, and
    modern boundaries are explicit'
  key_distinction: separate historical lesson from reconstruction of live tactics
    or current sources and methods
  vocabulary:
  - term: Declassification context
    definition: the release channel, date, and limits of an official historical source
  - term: Redaction caveat
    definition: the warning that missing text may change interpretation
  - term: Institutional lesson
    definition: the durable governance or analytic principle drawn from a case
  - term: Presentism
    definition: the error of forcing modern assumptions onto a historical record
  - term: Modern analogy
    definition: a bounded comparison that preserves differences between eras
  - term: Oversight failure
    definition: a documented breakdown in review, records, or accountability visible
      in the archive
  - term: Source-protection lesson
    definition: the historical principle about protecting people and methods without
      reconstructing live tradecraft
  worked_scenario: a sample seminar studies a declassified reform episode and extracts
    an oversight lesson without reconstructing current sources and methods
  worked_input: public archive metadata, a short excerpt, a timeline template, and
    an oversight-question worksheet
  worked_process: record provenance, mark redactions, build timeline, distinguish
    known from unknown, and extract a governance lesson
  worked_output: a historical case card with release context, caveats, lesson, and
    evidence-bounded boundary
  practice_focus: declassified-source interpretation and case-to-principle translation
  review_question: Which institutional lesson is defensible from the record, and which
    claim reconstructs live tradecraft?
- identifier: cyber_threat_intelligence
  disciplinary_frame: 'cyber threat intelligence as defensive normalization: incidents,
    indicators, TTPs, vendor risks, and sharing rules become useful only when scoped
    and validated'
  key_distinction: separate defensive mapping and incident learning from exploit,
    persistence, or evasion instruction
  vocabulary:
  - term: Indicator
    definition: an observable signal that may support defensive detection or investigation
  - term: TTP
    definition: a tactic, technique, or procedure used for structured defensive mapping
  - term: Sighting
    definition: a bounded observation of a possible indicator in a given context
  - term: Handling rule
    definition: a sharing, marking, or retention limit for threat information
  - term: Lessons learned
    definition: the post-incident evidence that changes controls or playbooks
  worked_scenario: a sample campus SOC reviews fabricated alert records after a tabletop
    incident
  worked_input: toy alerts, synthetic asset names, public ATT&CK technique descriptions,
    and a sharing-policy card
  worked_process: normalize indicators, map TTPs defensively, rate confidence, mark
    sharing limits, and record lessons learned
  worked_output: a CTI packet with indicators, TTP mapping, confidence, handling rule,
    and remediation owner
  practice_focus: defensive CTI normalization and tabletop incident learning
  review_question: Which indicator is useful only after context and confidence are
    added?
- identifier: ics_ot_defense
  disciplinary_frame: 'ICS/OT intelligence as safety-aware defensive reasoning: asset
    state, engineering consequence, operator decision, and recovery evidence matter
    as much as cyber indicators'
  key_distinction: separate cyber analysis from unsafe process control or live operational
    action
  vocabulary:
  - term: Engineering state
    definition: the physical or process condition that gives cyber evidence safety
      meaning
  - term: Consequence
    definition: the operational, safety, environmental, or service effect of a condition
  - term: Defense in depth
    definition: layered prevention, detection, response, and recovery controls
  - term: Tabletop inject
    definition: a synthetic event used to rehearse decisions without touching live
      systems
  - term: Recovery evidence
    definition: proof that a safe state, service, or learning objective was restored
  worked_scenario: a sample water-utility tabletop reviews synthetic process logs
    after a simulated anomaly
  worked_input: toy HMI screenshots, fabricated network alerts, public ICS control
    guidance, and a safety stop card
  worked_process: map assets to consequences, classify tabletop injects, identify
    human decisions, and preserve recovery evidence
  worked_output: a cyber-physical tabletop packet with assets, consequences, ATT&CK
    mapping, decisions, and debrief
  practice_focus: safety-aware tabletop readiness and defensive coverage review
  review_question: Which cyber observation changes meaning once physical consequence
    is considered?
- identifier: legal_oversight
  disciplinary_frame: 'legal and oversight architecture as design constraint: authority,
    rights, auditability, proportionality, transparency, and redress shape what work
    may proceed'
  key_distinction: separate having a capability from having authority and accountable
    review
  vocabulary:
  - term: Authority
    definition: the legal, institutional, or classroom basis for an activity
  - term: Proportionality
    definition: the test that a method is no more intrusive than the need justifies
  - term: Oversight
    definition: independent review that can challenge or constrain the activity
  - term: Redress
    definition: a path for affected people to contest or correct harm
  - term: Audit trail
    definition: retained evidence that enables later review of decisions and outputs
  worked_scenario: a sample agency training team reviews whether a classroom AI workflow
    is allowed
  worked_input: public policy excerpts, synthetic workflow notes, a rights-impact
    checklist, and an audit-log template
  worked_process: map authority, test proportionality, name affected groups, assign
    oversight, and define redress or escalation
  worked_output: an authority-and-impact register with approvals, limits, audit owner,
    and review date
  practice_focus: authority mapping and rights-aware release review
  review_question: What control turns a capability into an accountable, reviewable
    workflow?
